name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build

      - name: Extract version from tag
        id: version
        run: |
          # Remove the 'v' prefix from the tag (e.g. v0.1.20+26.2 -> 0.1.20+26.2)
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Veltium ${{ steps.version.outputs.version }} for 26.2"
          body: |
            - Updated to Veltium ${{ steps.version.outputs.version }} for Minecraft 26.2
            - Updated Fabric API to 0.153.0
            - Updated Fabric Loader to 0.19.3
            - Updated YACL to 3.9.5+26.2
            - Updated ModMenu to 20.0.0-beta.4
            - Updated Sodium to mc26.2-0.9.0
            - No new functions, only update port
          files: build/libs/*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
